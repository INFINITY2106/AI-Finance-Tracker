<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-container">

    <h1>Login</h1>

    <input
        type="email"
        id="loginEmail"
        placeholder="Email">

    <input
        type="password"
        id="loginPassword"
        placeholder="Password">

    <button onclick="login()">
        Login
    </button>

    <p>
        New User?
        <a href="signup.html">Create Account</a>
    </p>

</div>

<script src="login.js"></script>

</body>
</html>
